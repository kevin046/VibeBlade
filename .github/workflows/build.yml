name: Build

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Test import
        run: python -c "from vibeblade import VibeBladeModel, UnifiedMemoryPool, KVCache; print('OK')"

  build-cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          pip install --upgrade pip
          pip install setuptools wheel pybind11 cmake numpy

      - name: Build C++ extension
        run: |
          cd cpp
          mkdir build && cd build
          cmake .. -DPYBIND11_FINDPYTHON=ON
          make -j$(nproc)

      - name: Test C++ backend
        run: |
          pip install -e .
          python -c "from vibeblade import _CPP_BACKEND; print(f'C++ backend: {_CPP_BACKEND}')"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lint
        run: |
          pip install ruff
          ruff check vibeblade/ tests/

name: Build

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=long
        continue-on-error: true

      - name: Test import
        run: python -c "from vibeblade import VibeBladeModel, UnifiedMemoryPool, KVCache; print('OK')"

  build-cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          pip install --upgrade pip
          pip install setuptools wheel pybind11 cmake numpy

      - name: Build C++ extension
        run: |
          cd cpp
          mkdir -p build && cd build
          cmake .. -DPYBIND11_FINDPYTHON=ON
          make -j$(nproc)

      - name: Copy C++ library for editable install
        run: |
          SO_FILE=$(find cpp/build -name "*.so" -o -name "*.cp312*.pyd" 2>/dev/null | head -1)
          if [ -n "$SO_FILE" ]; then
            cp "$SO_FILE" vibeblade/
            echo "Copied $SO_FILE to vibeblade/"
          else
            echo "Warning: No .so file found in cpp/build"
          fi
          pip install -e .

      - name: Test C++ backend
        run: |
          python -c "from vibeblade import _CPP_BACKEND; print(f'C++ backend: {_CPP_BACKEND}')"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lint
        run: |
          pip install ruff
          ruff check vibeblade/ tests/
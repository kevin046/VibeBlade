<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VibeBlade Chat</title>
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
</head>
<body>
  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="brand-text">VibeBlade</span>
      </div>
      <button id="new-chat-btn" class="btn-new-chat" title="New Chat (Ctrl+N)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>
    <div class="sidebar-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search-input" placeholder="Search conversations...">
    </div>
    <nav id="conversation-list" class="conversation-list"></nav>
    <div class="sidebar-footer">
      <div class="model-badge" id="model-badge">Qwen3.6-27B-FP8</div>
      <button id="settings-btn" class="btn-icon" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
      </button>
    </div>
  </aside>

  <!-- Main chat area -->
  <main class="main">
    <header class="main-header">
      <button id="sidebar-toggle" class="btn-icon mobile-only" title="Toggle sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <h2 id="chat-title" class="chat-title">New Chat</h2>
      <div class="header-actions">
        <span id="token-counter" class="token-counter"></span>
      </div>
    </header>

    <div id="messages" class="messages"></div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea id="message-input" placeholder="Send a message..." rows="1" autofocus></textarea>
        <button id="stop-btn" class="btn-stop hidden" title="Stop generation">
          <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
            <rect x="6" y="6" width="12" height="12" rx="2"/>
          </svg>
        </button>
        <button id="send-btn" class="btn-send" title="Send (Enter)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div class="input-footer">Qwen3.6-27B with NEXTN speculative decoding. VibeBlade Chat v1.0.0</div>
    </div>
  </main>

  <!-- Settings panel -->
  <div id="settings-overlay" class="overlay hidden"></div>
  <aside id="settings-panel" class="settings-panel hidden">
    <div class="settings-header">
      <h3>Settings</h3>
      <button id="settings-close" class="btn-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="settings-body">
      <label class="setting-group">
        <span class="setting-label">Model</span>
        <select id="setting-model" class="setting-select">
          <option value="qwen3.6-27b-mtp">Qwen3.6-27B-FP8 (NEXTN)</option>
        </select>
      </label>
      <label class="setting-group">
        <span class="setting-label">Temperature <span id="temp-value">0.7</span></span>
        <input type="range" id="setting-temp" min="0" max="2" step="0.1" value="0.7" class="setting-range">
      </label>
      <label class="setting-group">
        <span class="setting-label">Max Tokens <span id="maxtok-value">4096</span></span>
        <input type="range" id="setting-maxtok" min="64" max="8192" step="64" value="4096" class="setting-range">
      </label>
      <label class="setting-group">
        <span class="setting-label">Top P <span id="topp-value">0.9</span></span>
        <input type="range" id="setting-topp" min="0" max="1" step="0.05" value="0.9" class="setting-range">
      </label>
      <label class="setting-group">
        <span class="setting-label">Top K <span id="topk-value">40</span></span>
        <input type="range" id="setting-topk" min="1" max="100" step="1" value="40" class="setting-range">
      </label>
      <div class="setting-group">
        <span class="setting-label">System Prompt</span>
        <textarea id="setting-system" class="setting-textarea" rows="4" placeholder="Optional system instructions..."></textarea>
      </div>
      <div class="setting-group">
        <span class="setting-label">Danger Zone</span>
        <button id="clear-all-btn" class="btn-danger">Clear All Conversations</button>
      </div>
    </div>
  </aside>

  <script src="/app.js"></script>
</body>
</html>
